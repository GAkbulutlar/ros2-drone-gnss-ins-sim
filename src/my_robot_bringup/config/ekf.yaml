ekf_filter_node:
  ros__parameters:

    frequency: 50.0
    sensor_timeout: 0.5     # increased: 0.1 s drops IMU msgs under sim-time jitter
    two_d_mode: true

    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_footprint
    world_frame:     odom

    publish_tf: true
    publish_acceleration: false

    # -----------------------------------------------------------------------
    # Sensor 0: Wheel Odometry  (/diff_drive_controller/odom)
    # vx  = forward speed from encoders
    # vyaw = yaw rate from differential wheel speed
    #        (biased because controller uses wheel_separation=0.60 m but actual=0.45 m)
    # IMU absolute yaw corrects this heading bias.
    # -----------------------------------------------------------------------
    odom0: /diff_drive_controller/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false

    # -----------------------------------------------------------------------
    # Sensor 1: IMU  (/imu)
    # Absolute yaw orientation + yaw rate only.
    # Acceleration disabled to prevent double-integration drift.
    # -----------------------------------------------------------------------
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 10
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    # -----------------------------------------------------------------------
    # Process noise covariance Q
    # Large yaw (0.15) lets IMU rapidly correct wheel heading bias.
    # Large x/y (0.05) allows position to respond to heading corrections.
