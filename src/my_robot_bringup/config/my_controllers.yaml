controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    imu_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

imu_broadcaster:
  ros__parameters:
    sensor_name: imu_sensor
    frame_id: imu_link

diff_drive_controller:
  ros__parameters:
    left_wheel_names:
      - base_front_left_wheel_joint
      - base_rear_left_wheel_joint
    right_wheel_names:
      - base_front_right_wheel_joint
      - base_rear_right_wheel_joint

    # Actual wheel separation is 0.45 m.
    # Using 0.80 m introduces a ~78% heading error per turn so that
    # raw wheel odometry clearly diverges from ground truth and
    # the EKF IMU correction is visually unmistakeable.
    wheel_separation: 0.80
    wheel_radius: 0.1

    odom_frame_id: odom
    base_frame_id: base_footprint

    # EKF node owns the odom->base_footprint TF; disable it here to avoid conflict
    enable_odom_tf: false

    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 1000000.0, 1000000.0, 0.01]

    open_loop: false
    velocity_rolling_window_size: 10
